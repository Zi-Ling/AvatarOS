services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - avatar_data:/root/.avatar
      - workspace:/app/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        # NEXT_PUBLIC_ 变量构建时静态注入，运行时设置无效
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # sandbox 镜像：backend 运行时动态拉起，执行 python.run / browser.run
  # 不常驻运行，只需要 build 好镜像供 backend 使用
  sandbox:
    build:
      context: ..
      dockerfile: docker/Dockerfile.sandbox
    image: avatar-sandbox:latest
    command: ["echo", "avatar-sandbox image ready"]
    restart: "no"

volumes:
  avatar_data:
  workspace:
