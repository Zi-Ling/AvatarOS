services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - avatar_data:/root/.avatar
      - workspace:/app/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Search providers (SearXNG works out of the box, commercial APIs are optional)
      - SEARXNG_URL=http://searxng:8888
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - GOOGLE_CSE_KEY=${GOOGLE_CSE_KEY:-}
      - GOOGLE_CSE_ID=${GOOGLE_CSE_ID:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    depends_on:
      searxng:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        # NEXT_PUBLIC_ vars are statically injected at build time, runtime changes have no effect
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # SearXNG — open-source metasearch engine, default provider for web.search (no API key needed)
  searxng:
    image: searxng/searxng:latest
    ports:
      - "9090:9090"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Sandbox image: dynamically launched by backend for python.run / browser.run
  # Not a long-running service — only needs to be built for backend to use
  sandbox:
    build:
      context: ..
      dockerfile: docker/Dockerfile.sandbox
    image: avatar-sandbox:latest
    command: ["echo", "avatar-sandbox image ready"]
    restart: "no"

volumes:
  avatar_data:
  workspace:
